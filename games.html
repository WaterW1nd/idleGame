<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Игра для малыша</title>
        <style>
            *,
            ::before,
            ::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                width: 100%;
                height: 100dvh;
                overflow: hidden;
                overscroll-behavior: none;
                font-family: "Segoe UI", Arial, sans-serif;
                background: #0a0a1a;
                color: #fff;
                user-select: none;
                -webkit-user-select: none;
                touch-action: none;
            }
            .screen {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: opacity 0.4s;
                pointer-events: none;
                opacity: 0;
            }
            .screen.active {
                opacity: 1;
                pointer-events: all;
            }
            #menu {
                background: radial-gradient(
                    ellipse at 50% 0%,
                    #1a1a4e 0%,
                    #0a0a1a 70%
                );
                flex-direction: column;
                gap: 24px;
                text-align: center;
                overflow-y: auto;
            }
            .menu-title {
                font-size: clamp(1.8rem, 5vw, 4rem);
                font-weight: 900;
                letter-spacing: -1px;
                background: linear-gradient(135deg, #a8edea, #fed6e3, #ffd89b);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 20px;
            }
            .menu-subtitle {
                font-size: clamp(0.85rem, 2.2vw, 1.2rem);
                color: rgba(255, 255, 255, 0.5);
                margin-top: -16px;
            }
            .mode-cards {
                display: flex;
                gap: 16px;
                flex-wrap: wrap;
                justify-content: center;
                padding: 0 16px;
            }
            .mode-card {
                background: rgba(255, 255, 255, 0.05);
                border: 2px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                padding: clamp(16px, 3vw, 32px) clamp(20px, 4vw, 40px);
                cursor: pointer;
                transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
                max-width: 280px;
                width: 100%;
            }
            .mode-card:hover {
                transform: translateY(-8px) scale(1.02);
                border-color: rgba(255, 255, 255, 0.3);
                background: rgba(255, 255, 255, 0.1);
            }
            .mode-card:active {
                transform: scale(0.97);
            }
            .mode-icon {
                font-size: clamp(2.5rem, 6vw, 4rem);
                margin-bottom: 12px;
                display: block;
                line-height: 1;
            }
            .mode-name {
                font-size: clamp(1.1rem, 2.5vw, 1.4rem);
                font-weight: 700;
                margin-bottom: 8px;
            }
            .mode-desc {
                font-size: clamp(0.8rem, 1.8vw, 0.9rem);
                color: rgba(255, 255, 255, 0.55);
                line-height: 1.5;
            }
            .mode-card.bubble-card {
                border-color: rgba(100, 200, 255, 0.3);
            }
            .mode-card.bubble-card:hover {
                border-color: rgba(100, 200, 255, 0.7);
                box-shadow: 0 0 40px rgba(100, 200, 255, 0.2);
            }
            .mode-card.meteor-card {
                border-color: rgba(255, 120, 50, 0.3);
            }
            .mode-card.meteor-card:hover {
                border-color: rgba(255, 120, 50, 0.7);
                box-shadow: 0 0 40px rgba(255, 120, 50, 0.2);
            }
            .stars-bg {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 0;
            }
            .menu-inner {
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 24px;
                padding: 20px 16px;
            }
            .music-picker {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            .music-picker-label {
                font-size: clamp(0.75rem, 1.8vw, 0.85rem);
                color: rgba(255, 255, 255, 0.4);
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            .music-picker-btn {
                background: rgba(255, 255, 255, 0.07);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 12px;
                padding: 10px 20px;
                color: #fff;
                font-size: 0.9rem;
                cursor: pointer;
                transition: all 0.2s;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .music-picker-btn:hover {
                background: rgba(255, 255, 255, 0.13);
                border-color: rgba(255, 255, 255, 0.3);
            }
            .music-picker-btn svg {
                width: 16px;
                height: 16px;
                flex-shrink: 0;
            }
            .music-file-name {
                font-size: 0.78rem;
                color: rgba(100, 200, 100, 0.8);
                max-width: 200px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            #music-file-input {
                display: none;
            }
            .back-btn {
                position: fixed;
                top: 12px;
                left: 12px;
                z-index: 1000;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 12px;
                padding: 10px 18px;
                color: #fff;
                font-size: 0.9rem;
                cursor: pointer;
                transition: all 0.2s;
                display: flex;
                align-items: center;
                gap: 8px;
                min-height: 44px;
            }
            .back-btn:hover {
                background: rgba(255, 255, 255, 0.2);
            }
            .back-btn svg {
                width: 16px;
                height: 16px;
            }

            /* FIX media */
            @media (max-width: 600px) {
                .back-btn {
                    padding: 8px 12px;
                    font-size: 0.8rem;
                }
                .hud,
                #meteor-hud {
                    top: 45px !important;
                    right: 12px !important;
                }
            }

            #bubble-screen,
            #meteor-screen {
                background: #000;
            }
            canvas {
                display: block;
                position: fixed;
                inset: 0;
                width: 100%;
                height: 100%;
            }
            .hud {
                position: fixed;
                top: 16px;
                right: 16px;
                z-index: 100;
                text-align: right;
                pointer-events: none;
            }
            .hud-score {
                font-size: clamp(1.1rem, 2.5vw, 1.4rem);
                font-weight: 700;
                text-shadow: 0 0 10px currentColor;
            }
            .hud-label {
                font-size: clamp(0.65rem, 1.5vw, 0.75rem);
                opacity: 0.5;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            #milestone {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(0);
                z-index: 500;
                background: rgba(0, 0, 0, 0.85);
                border-radius: 20px;
                padding: clamp(16px, 3vw, 24px) clamp(24px, 5vw, 48px);
                text-align: center;
                pointer-events: none;
                transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
                max-width: 90vw;
            }
            #milestone.show {
                transform: translate(-50%, -50%) scale(1);
            }
            #milestone-text {
                font-size: clamp(1.2rem, 4vw, 3rem);
                font-weight: 900;
            }
            #milestone-sub {
                font-size: clamp(0.8rem, 2vw, 1rem);
                opacity: 0.6;
                margin-top: 4px;
            }
            #meteor-hud {
                position: fixed;
                top: 16px;
                right: 16px;
                z-index: 100;
                pointer-events: none;
                text-align: right;
            }
            #destroyed-count {
                font-size: clamp(1.1rem, 2.5vw, 1.3rem);
                font-weight: 700;
                color: #ff8c42;
                text-shadow: 0 0 10px #ff8c42;
            }
            #destroyed-label {
                font-size: clamp(0.65rem, 1.5vw, 0.75rem);
                color: rgba(255, 255, 255, 0.5);
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            #ultra-hud {
                position: fixed;
                top: auto;
                bottom: 15%;
                left: 50%;
                transform: translateX(-50%);
                z-index: 200;
                pointer-events: none;
                text-align: center;
                display: none;
            }
            #ultra-hud.active {
                display: block;
            }
            .ultra-text {
                font-size: clamp(1.6rem, 4vw, 2.8rem);
                font-weight: 900;
                color: #fff;
                text-shadow:
                    0 0 30px #ff0,
                    0 0 60px #f80,
                    0 0 10px #fff;
                animation: ultraPulse 0.3s ease-in-out infinite alternate;
                letter-spacing: 2px;
            }
            .ultra-bar-wrap {
                margin-top: 6px;
                height: 8px;
                width: clamp(160px, 30vw, 260px);
                background: rgba(255, 255, 255, 0.15);
                border-radius: 4px;
                overflow: hidden;
                margin-inline: auto;
            }
            .ultra-bar {
                height: 100%;
                border-radius: 4px;
                background: linear-gradient(90deg, #ff0, #f80, #f00);
                transition: width 0.05s linear;
                box-shadow: 0 0 12px #f80;
            }
            @keyframes ultraPulse {
                0% {
                    text-shadow:
                        0 0 20px #ff0,
                        0 0 40px #f80,
                        0 0 5px #fff;
                }
                100% {
                    text-shadow:
                        0 0 40px #ff0,
                        0 0 80px #f80,
                        0 0 20px #fff;
                }
            }
            #touch-controls {
                display: none;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 100px;
                z-index: 150;
                pointer-events: none;
            }
            @media (max-width: 768px), (pointer: coarse) {
                #touch-controls {
                    display: flex;
                    justify-content: center;
                    align-items: flex-end;
                    padding-bottom: 25px;
                }
                .emp-btn {
                    width: auto;
                    padding: 0 30px;
                    height: 55px;
                    border-radius: 28px;
                    background: rgba(100, 255, 200, 0.2);
                    border: 2px solid rgba(100, 255, 200, 0.5);
                    color: #fff;
                    font-weight: bold;
                    font-size: 1.1rem;
                    pointer-events: all;
                    box-shadow: 0 0 15px rgba(100, 255, 200, 0.2);
                    user-select: none;
                    -webkit-tap-highlight-color: transparent;
                    transition: all 0.1s;
                }
                .emp-btn:active {
                    background: rgba(100, 255, 200, 0.4);
                    transform: scale(0.95);
                }
            }
        </style>
    </head>
    <body>
        <canvas id="stars-canvas" class="stars-bg"></canvas>
        <input
            type="file"
            id="music-file-input"
            accept="audio/mp3,audio/mpeg,audio/ogg,audio/wav,audio/*"
        />

        <div id="menu" class="screen active">
            <div class="menu-inner">
                <div>
                    <div class="menu-title">🎮 ИГРОТЕКА</div>
                    <div class="menu-subtitle">Выбери во что будем играть</div>
                </div>
                <div class="mode-cards">
                    <div
                        class="mode-card bubble-card"
                        onclick="startMode('bubble')"
                    >
                        <span class="mode-icon">🎈</span>
                        <div class="mode-name">Лопать пузыри</div>
                        <div class="mode-desc">
                            Спокойный режим! Лопай пальчиком, ищи животных!
                        </div>
                    </div>
                    <div
                        class="mode-card meteor-card"
                        onclick="startMode('meteor')"
                    >
                        <span class="mode-icon">🛸</span>
                        <div class="mode-name">Защита планеты</div>
                        <div class="mode-desc">
                            Активный режим! Сбивай метеориты лазером!
                        </div>
                    </div>
                </div>
                <div class="music-picker">
                    <div class="music-picker-label">🎵 Своя музыка фоном</div>
                    <button
                        class="music-picker-btn"
                        onclick="
                            document.getElementById('music-file-input').click()
                        "
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                        <span id="music-btn-label">Выбрать MP3</span>
                    </button>
                    <div
                        class="music-file-name"
                        id="music-file-name"
                        style="display: none"
                    ></div>
                </div>
            </div>
        </div>

        <div id="bubble-screen" class="screen">
            <button class="back-btn" onclick="goMenu()">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                >
                    <path d="M19 12H5M12 5l-7 7 7 7"></path>
                </svg>
                В МЕНЮ
            </button>
            <div class="hud">
                <div class="hud-label">ЛОПНУТО ПУЗЫРЕЙ</div>
                <div class="hud-score" id="bubble-score" style="color: #7dd3fc">
                    🎈 0
                </div>
            </div>
            <canvas id="bubble-canvas"></canvas>
        </div>

        <div id="meteor-screen" class="screen">
            <button class="back-btn" onclick="goMenu()">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                >
                    <path d="M19 12H5M12 5l-7 7 7 7"></path>
                </svg>
                В МЕНЮ
            </button>
            <div id="meteor-hud">
                <div id="destroyed-label">УНИЧТОЖЕНО</div>
                <div id="destroyed-count">☄️ 0</div>
            </div>
            <div id="ultra-hud">
                <div class="ultra-text">⚡ ULTRA MODE ⚡</div>
                <div class="ultra-bar-wrap">
                    <div
                        class="ultra-bar"
                        id="ultra-bar"
                        style="width: 100%"
                    ></div>
                </div>
            </div>
            <canvas id="meteor-canvas"></canvas>
            <div id="touch-controls">
                <button class="emp-btn" id="touch-emp">💥 СУПЕР-ВОЛНА</button>
            </div>
        </div>

        <div id="milestone">
            <div id="milestone-text"></div>
            <div id="milestone-sub"></div>
        </div>

        <script>
            // === GLOBAL STATE ===
            let currentMode = null;
            let letDpr = 1;
            let animId = null;

            // pull-to-refresh iOS
            document.addEventListener(
                "touchmove",
                function (e) {
                    if (e.cancelable) e.preventDefault();
                },
                { passive: false },
            );

            const W = () => window.innerWidth;
            const H = () => window.innerHeight;

            function resizeCanvas(canvas) {
                const dpr = window.devicePixelRatio || 1;
                letDpr = dpr;
                const w = W(),
                    h = H();
                canvas.width = w * dpr;
                canvas.height = h * dpr;
                canvas.style.width = w + "px";
                canvas.style.height = h + "px";

                const ctx = canvas.getContext("2d");
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
            }

            function showScreen(id) {
                document
                    .querySelectorAll(".screen")
                    .forEach((s) => s.classList.remove("active"));
                document.getElementById(id).classList.add("active");
            }

            function goMenu() {
                if (animId) {
                    cancelAnimationFrame(animId);
                    animId = null;
                }
                stopBubbleMode();
                stopMeteorMode();
                stopBgMusic();
                currentMode = null;

                const milestoneEl = document.getElementById("milestone");
                if (milestoneEl) milestoneEl.classList.remove("show");
                if (
                    typeof milestoneTimeout !== "undefined" &&
                    milestoneTimeout
                ) {
                    clearTimeout(milestoneTimeout);
                    milestoneTimeout = null;
                }
                showScreen("menu");
                initStars();
            }

            function startMode(mode) {
                ensureAudioCtx();
                currentMode = mode;
                startBgMusic();
                if (mode === "bubble") {
                    showScreen("bubble-screen");
                    initBubbleMode();
                } else {
                    showScreen("meteor-screen");
                    initMeteorMode();
                }
            }

            window.addEventListener("resize", () => {
                resizeCanvas(document.getElementById("stars-canvas"));
                if (currentMode === "bubble")
                    resizeCanvas(document.getElementById("bubble-canvas"));
                if (currentMode === "meteor")
                    resizeCanvas(document.getElementById("meteor-canvas"));
            });

            // === MP3 MUSIC ===
            let bgAudio = null;
            let bgMusicURL = null;
            let bgMusicName = null;

            document
                .getElementById("music-file-input")
                .addEventListener("change", function (e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    if (bgMusicURL) URL.revokeObjectURL(bgMusicURL);
                    bgMusicURL = URL.createObjectURL(file);
                    bgMusicName = file.name.replace(/\.[^/.]+$/, "");
                    document.getElementById("music-btn-label").textContent =
                        "Музыка выбрана";
                    const nameEl = document.getElementById("music-file-name");
                    nameEl.textContent = bgMusicName;
                    nameEl.style.display = "block";
                    if (bgAudio) {
                        bgAudio.pause();
                        bgAudio = null;
                    }
                });

            function startBgMusic() {
                if (!bgMusicURL) return;
                if (!bgAudio) {
                    bgAudio = new Audio(bgMusicURL);
                    bgAudio.loop = true;
                    bgAudio.volume = 0.4;
                }
                bgAudio.currentTime = 0;
                const playPromise = bgAudio.play();
                if (playPromise !== undefined) {
                    playPromise
                        .then(() => {
                            if (
                                typeof audioCtx !== "undefined" &&
                                audioCtx &&
                                audioCtx.state !== "running"
                            ) {
                                audioCtx.resume();
                            }
                        })
                        .catch((e) =>
                            console.log("Автозапуск аудио заблокирован", e),
                        );
                }
            }

            function stopBgMusic() {
                if (bgAudio) {
                    bgAudio.pause();
                    bgAudio.currentTime = 0;
                }
            }

            // === AUDIO CONTEXT (FIX ДЛЯ GITHUB PAGES И БРАУЗЕРОВ) ===
            let audioCtx = null;

            function ensureAudioCtx() {
                if (!audioCtx) {
                    const AudioContext =
                        window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                }
                if (audioCtx.state === "suspended") {
                    // Пытаемся запустить (игнорируем ошибку, если браузер еще упрямится)
                    audioCtx.resume().catch(() => {});
                }
                return audioCtx;
            }

            // Глобальный "обход" блокировки звука (Autoplay Policy).
            // Инициализирует аудио-движок при самом первом касании/клике по экрану.
            function unlockAudioGlobal() {
                const ctx = ensureAudioCtx();
                if (ctx.state === "running") {
                    // Как только звук успешно разблокирован, убираем эти "слушатели",
                    // чтобы они не тратили ресурсы.
                    document.removeEventListener(
                        "click",
                        unlockAudioGlobal,
                        true,
                    );
                    document.removeEventListener(
                        "touchstart",
                        unlockAudioGlobal,
                        true,
                    );
                    document.removeEventListener(
                        "keydown",
                        unlockAudioGlobal,
                        true,
                    );
                }
            }

            // Слушаем вообще всё, что делает пользователь на странице
            document.addEventListener("click", unlockAudioGlobal, {
                capture: true,
                passive: true,
            });
            document.addEventListener("touchstart", unlockAudioGlobal, {
                capture: true,
                passive: true,
            });
            document.addEventListener("keydown", unlockAudioGlobal, {
                capture: true,
                passive: true,
            });

            // === STARS BACKGROUND ===
            const starsCanvas = document.getElementById("stars-canvas");
            const sCtx = starsCanvas.getContext("2d");
            let stars = [];
            let starsAnimId = null;

            function initStars() {
                resizeCanvas(starsCanvas);
                stars = Array.from({ length: 120 }, () => ({
                    x: Math.random() * W(),
                    y: Math.random() * H(),
                    r: Math.random() * 1.5 + 0.3,
                    a: Math.random(),
                    speed: Math.random() * 0.005 + 0.002,
                }));
                if (starsAnimId) cancelAnimationFrame(starsAnimId);
                animateStars();
            }
            function animateStars() {
                if (currentMode !== null) {
                    starsAnimId = null;
                    return;
                }
                sCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
                stars.forEach((s) => {
                    s.a += s.speed;
                    const alpha = 0.2 + 0.8 * Math.abs(Math.sin(s.a));
                    sCtx.beginPath();
                    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    sCtx.fillStyle = `rgba(255,255,255,${alpha})`;
                    sCtx.fill();
                });
                starsAnimId = requestAnimationFrame(animateStars);
            }
            initStars();

            // === MILESTONE ===
            let milestoneTimeout = null;
            function showMilestone(text, sub, color) {
                const el = document.getElementById("milestone");
                document.getElementById("milestone-text").textContent = text;
                document.getElementById("milestone-text").style.color =
                    color || "#fff";
                document.getElementById("milestone-sub").textContent = sub;
                el.classList.add("show");
                if (milestoneTimeout) clearTimeout(milestoneTimeout);
                milestoneTimeout = setTimeout(() => {
                    el.classList.remove("show");
                }, 2200);
            }

            // =====================================================================
            // ===========================  BUBBLE MODE  ===========================
            // =====================================================================
            const BC = document.getElementById("bubble-canvas");
            const bCtx = BC.getContext("2d");
            let bubbles = [],
                bParticles = [],
                bTrail = [],
                bBigText = [];
            let bubbleCount = 0,
                bubbleAnimId = null,
                bubbleSpawnTimer = null;
            let lastBubbleKey = 0,
                lastBubbleClick = 0,
                lastTrail = 0;
            const EMOJICHARS = [
                "🐸",
                "🐶",
                "🐱",
                "🐹",
                "🐰",
                "🦊",
                "🐻",
                "🐼",
                "🦁",
                "🐮",
                "🐷",
                "🦆",
                "🦋",
                "🌸",
                "🌈",
                "⭐",
                "🎈",
                "🎉",
                "❤️",
                "🌙",
                "☀️",
                "🎀",
                "🎵",
                "🍬",
                "🍕",
                "💎",
            ];
            const MAXPARTICLES = 150,
                MAXBUBBLES = 20,
                MAXTRAIL = 40;
            let bClouds = [],
                bBgHue = 200,
                bBgPhase = 0;

            function initBubbleBg() {
                bClouds = Array.from({ length: 8 }, () => ({
                    x: Math.random() * W() * 1.4 - W() * 0.2,
                    y: Math.random() * H() * 0.7,
                    w: 80 + Math.random() * 160,
                    h: 30 + Math.random() * 60,
                    speed: 0.1 + Math.random() * 0.25,
                    alpha: 0.06 + Math.random() * 0.1,
                }));
            }
            function drawBubbleBg(ctx) {
                bBgPhase += 0.003;
                bBgHue = 190 + Math.sin(bBgPhase) * 30;
                const h = H(),
                    w = W();
                const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
                skyGrad.addColorStop(0, `hsl(${bBgHue},60%,8%)`);
                skyGrad.addColorStop(0.5, `hsl(${bBgHue + 40},50%,6%)`);
                skyGrad.addColorStop(1, `hsl(${(bBgHue + 220) % 360},40%,4%)`);
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, w, h);
                bClouds.forEach((c) => {
                    c.x += c.speed;
                    if (c.x > w + c.w) c.x = -c.w;
                    ctx.save();
                    ctx.globalAlpha = c.alpha;
                    ctx.beginPath();
                    ctx.ellipse(c.x, c.y, c.w, c.h * 0.5, 0, 0, Math.PI * 2);
                    const cGrad = ctx.createRadialGradient(
                        c.x,
                        c.y,
                        0,
                        c.x,
                        c.y,
                        c.w,
                    );
                    cGrad.addColorStop(0, `hsla(${bBgHue},80%,80%,0.3)`);
                    cGrad.addColorStop(1, "rgba(0,0,0,0)");
                    ctx.fillStyle = cGrad;
                    ctx.fill();
                    ctx.restore();
                });
            }

            function bubbleClickHandler(e) {
                const now = Date.now();

                lastBubbleClick = now;
                const rect = BC.getBoundingClientRect();
                const cx = e.clientX - rect.left,
                    cy = e.clientY - rect.top;
                let hit = false;
                for (let i = bubbles.length - 1; i >= 0; i--) {
                    const b = bubbles[i];
                    if (
                        !b.popping &&
                        Math.hypot(cx - b.x, cy - b.y) < b.r * 1.15
                    ) {
                        popBubble(b);
                        hit = true;
                        break;

                if (!hit) spawnClickEffect(cx, cy);

                    const cx = t.clientX - rect.left,

            function drawBubble(ctx, x, y, r, hue, alpha) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                const grad = ctx.createRadialGradient(
                    x - r * 0.3,
                    y - r * 0.3,
                    r * 0.1,
                    x,
                    y,
                    r,
                );
                grad.addColorStop(0, `hsla(${hue},100%,90%,0.18)`);
                grad.addColorStop(0.6, `hsla(${hue},80%,60%,0.09)`);
                grad.addColorStop(1, `hsla(${hue},100%,70%,0.3)`);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = `hsla(${hue},100%,80%,0.75)`;
                ctx.lineWidth = 1.8;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(x - r * 0.28, y - r * 0.28, r * 0.25, 0, Math.PI * 2);
                const hlGrad = ctx.createRadialGradient(
                    x - r * 0.28,
                    y - r * 0.28,
                    0,
                    x - r * 0.28,
                    y - r * 0.28,
                    r * 0.25,
                );
                hlGrad.addColorStop(0, "rgba(255,255,255,0.75)");
                hlGrad.addColorStop(1, "rgba(255,255,255,0)");
                ctx.fillStyle = hlGrad;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + r * 0.2, y + r * 0.3, r * 0.1, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,255,255,0.35)";
                ctx.fill();
                ctx.restore();
            }

            // === НОВАЯ ФУНКЦИЯ: Генератор пузырей (чтобы закрыть мертвую зону iOS) ===
            function drawBubbleGenerator(ctx, w, h) {
                const baseH = 110; // Высота нашей неигровой "панели" внизу (закрывает зону iOS)
                ctx.save();

                // Рисуем корпус (яркий градиент)
                const grad = ctx.createLinearGradient(0, h - baseH, 0, h);
                grad.addColorStop(0, "#4facfe"); // Голубой сверху
                grad.addColorStop(0.5, "#1a1a4e"); // Плавный уход в темно-синий
                grad.addColorStop(1, "#0a0a1a"); // Точный цвет фона игры (#0a0a1a) в самом низу
                ctx.fillStyle = grad;

                ctx.beginPath();
                // Рисуем волнистый край, чтобы это выглядело как прикольный механизм
                ctx.moveTo(0, h - baseH + 20);
                ctx.quadraticCurveTo(
                    w * 0.25,
                    h - baseH - 20,
                    w * 0.5,
                    h - baseH + 15,
                );
                ctx.quadraticCurveTo(
                    w * 0.75,
                    h - baseH + 40,
                    w,
                    h - baseH + 10,
                );
                ctx.lineTo(w, h);
                ctx.lineTo(0, h);
                ctx.fill();

                // Светлый кант по волнистому краю для объема
                ctx.beginPath();
                ctx.moveTo(0, h - baseH + 20);
                ctx.quadraticCurveTo(
                    w * 0.25,
                    h - baseH - 20,
                    w * 0.5,
                    h - baseH + 15,
                );
                ctx.quadraticCurveTo(
                    w * 0.75,
                    h - baseH + 40,
                    w,
                    h - baseH + 10,
                );
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; // Чуть мягче свечение
                ctx.lineWidth = 2; // <--- Сделали линию тонкой (было 6)
                ctx.stroke();

                // Декоративные "сопла", откуда как бы летят пузыри
                const holes = [0.15, 0.5, 0.85];
                holes.forEach((px, i) => {
                    const cx = w * px;
                    // На телефонах (w < 600) делаем сопла поуже, чтобы не слипались
                    const radiusX = w < 600 ? Math.min(30, w * 0.12) : 35;
                    const radiusY = 10;

                    // Смещаем их чуть ниже линии (ближе к тексту)
                    const cy = h - baseH + (i === 1 ? 55 : 65);

                    ctx.beginPath();
                    ctx.ellipse(cx, cy, radiusX, radiusY, 0, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
                    ctx.fill();
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.4)"; // Сделали обводку мягче
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });

                // Прикольная надпись в самом низу
                ctx.textAlign = "center";
                ctx.fillStyle = "#fff";
                ctx.font = '900 16px "Segoe UI", Arial, sans-serif';
                ctx.shadowColor = "rgba(0,0,0,0.2)";
                ctx.shadowBlur = 4;
                ctx.shadowOffsetY = 2;
                ctx.fillText("🎈 ГЕНЕРАТОР ПУЗЫРЕЙ 🎈", w / 2, h - 20);

                ctx.restore();
            }

            function bubbleLoop() {
                resizeCanvas(BC);
                const ctx = bCtx;
                drawBubbleBg(ctx);
                for (let i = bTrail.length - 1; i >= 0; i--) {
                    const t = bTrail[i];
                    t.life -= 0.06;
                    t.alpha = t.life;
                    t.r *= 0.96;
                    if (t.life <= 0) {
                        bTrail.splice(i, 1);
                        continue;
                    }
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${t.hue},100%,70%,${t.alpha * 0.5})`;
                    ctx.fill();
                }
                for (let i = bParticles.length - 1; i >= 0; i--) {
                    const p = bParticles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.08;
                    p.life -= 0.022;
                    p.alpha = p.life;
                    if (p.life <= 0) {
                        bParticles.splice(i, 1);
                        continue;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue},100%,70%,${p.alpha})`;
                    ctx.fill();
                }
                for (let i = bBigText.length - 1; i >= 0; i--) {
                    const t = bBigText[i];
                    t.y += t.vy;
                    t.vy *= 0.97;
                    t.alpha -= 0.016;
                    if (t.alpha <= 0) {
                        bBigText.splice(i, 1);
                        continue;
                    }
                    ctx.save();
                    ctx.globalAlpha = t.alpha;
                    ctx.font =
                        "900 " +
                        t.size +
                        "px Segoe UI Emoji,Apple Color Emoji,Noto Color Emoji,Arial,sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillStyle = "#fff";
                    ctx.shadowColor = "rgba(100,200,255,0.8)";
                    ctx.shadowBlur = 20;
                    ctx.fillText(t.text, t.x, t.y);
                    ctx.restore();
                }
                for (let i = bubbles.length - 1; i >= 0; i--) {
                    const b = bubbles[i];
                    if (b.popping) {
                        b.popProgress += 0.07;
                        if (b.popProgress >= 1) {
                            bubbles.splice(i, 1);
                            continue;
                        }
                        drawBubble(
                            ctx,
                            b.x,
                            b.y,
                            b.r * (1 + b.popProgress * 0.5),
                            b.hue,
                            1 - b.popProgress,
                        );
                        continue;
                    }
                    b.wobblePhase += 0.03;
                    b.x += b.vx + Math.sin(b.wobblePhase) * b.wobbleAmp;
                    b.y += b.vy;
                    if (b.y < -b.r * 2) {
                        bubbles.splice(i, 1);
                        continue;
                    }
                    drawBubble(ctx, b.x, b.y, b.r, b.hue, 1);
                }
                drawBubbleGenerator(ctx, W(), H());
                bubbleAnimId = requestAnimationFrame(bubbleLoop);
            }

            function mKeyDown(e) {
                keysDown[e.key] = true;
                if (e.key === " " && !e.repeat) {
                    fireEMP();
                    ensureAudioCtx();
                } else if (e.key === "Enter" || e.key === "Shift") {
                    if (isGameOver && Date.now() - gameOverTime > 1500) {

                            restartButtonPressedTime = Date.now();
                        return;
                    }
                    isMouseDown = true;
                    ensureAudioCtx();

            // === FIX: ПЕРЕРАСЧЕТ КООРДИНАТ ДЛЯ RETINA ===
            function mMouseMove(e) {
                const rect = MC.getBoundingClientRect();

            function mMouseDown(e) {
                if (e.button === 0) {
                    const rect = MC.getBoundingClientRect();

                            e.clientX - rect.left,
                            e.clientY - rect.top,

                        return;

                    isMouseDown = true;
                    ensureAudioCtx();

            function mMouseUp(e) {
