            }

            function mTouchMove(e) {
                if (e.cancelable) e.preventDefault();
                const rect = MC.getBoundingClientRect();
                mouseX = e.touches[0].clientX - rect.left;
            }
            function mTouchStart(e) {
                if (e.cancelable) e.preventDefault();
                const rect = MC.getBoundingClientRect();
                const cx = e.touches[0].clientX - rect.left;
                const cy = e.touches[0].clientY - rect.top;
                if (isGameOver) {
                    handleGameOverClick(cx, cy);
                    return;
                }
                isMouseDown = true;
                mouseX = cx;
                ensureAudioCtx();
            }
            function mTouchEnd(e) {
                if (e.cancelable) e.preventDefault();
                isMouseDown = false;
            }

            function handleGameOverClick(clientX, clientY) {
                if (Date.now() - gameOverTime < 1500) return;
                if (restartButtonPressedTime > 0) return;
                const btnW = 280,
                    btnH = 60,
                    btnX = W() / 2 - btnW / 2,
                    btnY = H() / 2 + 70;
                if (
                    clientX >= btnX &&
                    clientX <= btnX + btnW &&
                    clientY >= btnY &&
                    clientY <= btnY + btnH
                ) {
                    restartButtonPressedTime = Date.now();
                }
            }

            function playEmptySound() {
                try {
                    const actx = ensureAudioCtx();
                    const osc = actx.createOscillator(),
                        gain = actx.createGain();
                    osc.type = "sawtooth";
                    osc.frequency.setValueAtTime(150, actx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(
                        80,
                        actx.currentTime + 0.2,
                    );
                    gain.gain.setValueAtTime(0.2, actx.currentTime);
                    gain.gain.linearRampToValueAtTime(
                        0,
                        actx.currentTime + 0.2,
                    );
                    osc.connect(gain);
                    gain.connect(actx.destination);
                    osc.start();
                    osc.stop(actx.currentTime + 0.2);
                } catch (e) {}
            }

            function fireEMP() {
                if (isGameOver) return;
                if (empCharges <= 0) {
                    empWarningTime = Date.now();
                    playEmptySound();
                    return;
                }
                empCharges--;
                const cx = W() / 2,
                    pR = Math.max(W(), H()) * 1.5,
                    cy = H() + pR - 70;
                empWaves.push({ cx, cy, r: pR, dr: 18, alpha: 1.0 });
                playUltraSound();
                doScreenShake(MC, 12, 500);

                const btn = document.getElementById("touch-emp");
                if (btn) btn.innerHTML = "💥 СУПЕР-ВОЛНА (" + empCharges + ")";
            }

            function spawnMeteor() {
                const maxM = W() < 600 ? (ultraMode ? 8 : 15) : 15;
                if (meteors.length >= maxM || isGameOver) return;
                const r = 15 + Math.random() * 25,
                    x = Math.random() * (W() - r * 2) + r,
                    y = -r * 2;
                const targetX = saucer.x + (Math.random() - 0.5) * 300,
                    targetY = saucer.y;
                const angle = Math.atan2(targetY - y, targetX - x),
                    speed = (Math.random() * 2.0 + 1.5) * 0.85;
                const hp = getMeteorHP(r),
                    pts = 7 + Math.floor(Math.random() * 4),
                    verts = [];
                for (let i = 0; i < pts; i++)
                    verts.push(0.7 + Math.random() * 0.4);
                let isExplosive = false,
                    isGlowing = false,
                    hue,
                    sat,
                    lit;
                if (Math.random() < 0.15) {
                    isExplosive = true;
                    hue = 15;
                    sat = 90;
                    lit = 50;
                } else {
                    isGlowing = Math.random() < 0.2;
                    const ct = Math.floor(Math.random() * 4);
                    if (ct === 0) {
                        hue = 0;
                        sat = 0;
                        lit = 45;
                    } else if (ct === 1) {
                        hue = 280;
                        sat = 50;
                        lit = 45;
                    } else if (ct === 2) {
                        hue = 120;
                        sat = 50;
                        lit = 40;
                    } else {
                        hue = 200;
                        sat = 60;
                        lit = 45;
                    }
                }
                meteors.push({
                    x,
                    y,
                    r,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    rot: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.05,
                    hp,
                    maxHp: hp,
                    verts,
                    hitTime: 0,
                    isExplosive,
                    isGlowing,
                    hue,
                    sat,
                    lit,
                    color: `hsl(${hue},${sat}%,${lit}%)`,
                });
            }
            function spawnMeteorBatch(n) {
                for (let i = 0; i < n; i++) spawnMeteor();
            }

            function fireLaser() {
                laserColor = (laserColor + 1) % LASER_COLORS.length;
                const angle = saucer.angle,
                    nx = Math.cos(angle),
                    ny = Math.sin(angle);
                lasers.push({
                    x: saucer.x + nx * saucer.r,
                    y: saucer.y + ny * saucer.r,
                    vx: nx * 18,
                    vy: ny * 18,
                    color: LASER_COLORS[laserColor],
                    life: 1,
                    width: 3 + Math.random() * 3,
                    prevX: saucer.x + nx * saucer.r,
                    prevY: saucer.y + ny * saucer.r,
                });
                playLaserSound();
            }

            function activateUltraMode() {
                ultraMode = true;
                ultraEndTime = Date.now() + ULTRA_DURATION;
                const hud = document.getElementById("ultra-hud");
                hud.style.top = "auto";
                hud.style.bottom = "15%";
                hud.classList.add("active");
                playUltraSound();
                doScreenShake(MC, 8, 300);
            }

            function doScreenShake(el, intensity, duration) {
                const start = Date.now(),
                    origTransform = el.style.transform;
                function shake() {
                    const elapsed = Date.now() - start;
                    if (elapsed > duration) {
                        el.style.transform = origTransform;
                        return;
                    }
                    const pr = 1 - elapsed / duration;
                    el.style.transform = `translate(${(Math.random() - 0.5) * intensity * 2 * pr}px,${(Math.random() - 0.5) * intensity * 2 * pr}px)`;
                    requestAnimationFrame(shake);
                }
                requestAnimationFrame(shake);
            }

            function drawUltraBeam(ctx) {
                const bw = ultraMode
                    ? 20 + Math.sin(Date.now() * 0.015) * 10
                    : 0;
                ctx.save();
                ctx.translate(saucer.x, saucer.y);
                ctx.rotate(saucer.angle + Math.PI / 2);
                const grad = ctx.createLinearGradient(-bw, 0, bw, 0);
                grad.addColorStop(0, "rgba(255,200,0,0)");
                grad.addColorStop(0.2, "rgba(255,100,0,0.4)");
                grad.addColorStop(0.5, "rgba(255,255,255,0.9)");
                grad.addColorStop(0.8, "rgba(255,100,0,0.4)");
                grad.addColorStop(1, "rgba(255,200,0,0)");
                const bl = -H() * 1.5;
                ctx.globalAlpha = 0.85 + Math.sin(Date.now() * 0.02) * 0.15;
                ctx.fillStyle = grad;
                ctx.fillRect(-bw, bl, bw * 2, -bl);
                ctx.globalAlpha = 1;
                const cw = bw * 0.25;
                ctx.fillStyle = "rgba(255,255,255,0.95)";
                ctx.shadowBlur = 30;
                ctx.shadowColor = "#fff";
                ctx.fillRect(-cw, bl, cw * 2, -bl);
                ctx.shadowBlur = 0;
                ctx.restore();
                for (let j = meteors.length - 1; j >= 0; j--) {
                    const m = meteors[j];
                    if (!m || m.markedForDeath) continue;
                    if (
                        Math.abs(m.x - saucer.x) < m.r + bw * 1.5 &&
                        m.y < saucer.y
                    ) {
                        m.markedForDeath = true;
                        for (let k = 0; k < 8; k++) {
                            if (mParticles.length > 300) break;
                            const a = Math.random() * Math.PI * 2,
                                spd = 3 + Math.random() * 6;
                            mParticles.push({
                                x: m.x,
                                y: m.y,
                                vx: Math.cos(a) * spd,
                                vy: Math.sin(a) * spd,
                                r: 2 + Math.random() * 4,
                                color: "#fff",
                                alpha: 1,
                                life: 1,
                                decay: 0.025,
                            });
                        }
                    }
                }
            }

            function meteorLoop() {
                resizeCanvas(MC);
                mCtx.clearRect(0, 0, MC.width, MC.height);
                mCtx.fillStyle = "#000008";
                mCtx.fillRect(0, 0, W(), H());
                mStars.forEach((s) => {
                    mCtx.beginPath();
                    mCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    mCtx.fillStyle = `rgba(255,255,255,${0.3 + 0.7 * Math.abs(Math.sin((s.a += 0.01)))})`;
                    mCtx.fill();
                });

                const cx = W() / 2,
                    pR = Math.max(W(), H()) * 1.5,
                    cy = H() + pR - 70;
                mCtx.save();
                mCtx.beginPath();
                mCtx.arc(cx, cy, pR, Math.PI, Math.PI * 2);
                const pGrad = mCtx.createRadialGradient(
                    cx,
                    cy,
                    pR - 100,
                    cx,
                    cy,
                    pR,
                );
                pGrad.addColorStop(0, "#000000");
                pGrad.addColorStop(0.8, "#0a1020");
                pGrad.addColorStop(1, "#204060");
                mCtx.fillStyle = pGrad;
                mCtx.fill();
                mCtx.strokeStyle = "rgba(100, 200, 255, 0.5)";
                mCtx.lineWidth = 3;
                mCtx.shadowColor = "#64c8ff";
                mCtx.shadowBlur = 15;
                mCtx.stroke();
                mCtx.restore();

                if (isGameOver) {
                    if (gameOverTime === 0) gameOverTime = Date.now();
                    ultraMode = false;
                    document
                        .getElementById("ultra-hud")
                        .classList.remove("active");
                    isMouseDown = false;
                    keysDown = {};
                    mCtx.fillStyle = isGameWon
                        ? "rgba(0, 20, 10, 0.8)"
                        : "rgba(0, 0, 10, 0.8)";
                    mCtx.fillRect(0, 0, W(), H());
                    mCtx.fillStyle = isGameWon ? "#44ff88" : "#ff3366";
                    mCtx.font = "bold 48px sans-serif";
                    mCtx.textAlign = "center";
                    mCtx.fillText(
                        isGameWon ? "ПОБЕДА!" : "ИГРА ОКОНЧЕНА",
                        W() / 2,
                        H() / 2 - 30,
                    );
                    mCtx.fillStyle = "#ffffff";
                    mCtx.font = "24px sans-serif";
                    mCtx.fillText(
                        `Сбито: ${meteorDestroyed} / 1000 | Пропущено: ${missedMeteors}`,
                        W() / 2,
                        H() / 2 + 20,
                    );
                    if (Date.now() - gameOverTime > 1500) {
                        const isPr = restartButtonPressedTime > 0,
                            bw = 280,
                            bh = 60,
                            bx = W() / 2 - bw / 2;
                        let by = H() / 2 + 70;
                        if (isPr) by += 4;
                        mCtx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(Date.now() / 150) * 0.1})`;
                        if (
                            Date.now() - restartButtonPressedTime > 150 &&
                            isPr
                        ) {
                            initMeteorMode();
                            return;
                        } else {
                            mCtx.fillStyle = "rgba(255,255,255,0.1)";
                            mCtx.beginPath();
                            if (mCtx.roundRect)
                                mCtx.roundRect(bx, by, bw, bh, 15);
                            else mCtx.rect(bx, by, bw, bh);
                            mCtx.fill();
                            mCtx.strokeStyle = isPr
                                ? "rgba(255,255,255,0.9)"
                                : "rgba(255,255,255,0.5)";
                            mCtx.lineWidth = 2;
                            mCtx.stroke();
                            mCtx.fillStyle = "#ffffff";
                            mCtx.font = "bold 22px sans-serif";
                            mCtx.fillText("ИГРАТЬ СНОВА", W() / 2, by + 38);
                        }
                    }
                    meteorAnimId = requestAnimationFrame(meteorLoop);
                    return;
                }

                for (let i = empWaves.length - 1; i >= 0; i--) {
                    const w = empWaves[i];
                    w.r += w.dr;
                    w.alpha -= 0.01;
                    if (w.alpha <= 0) {
                        empWaves.splice(i, 1);
                        continue;
                    }
                    mCtx.save();
                    mCtx.beginPath();
                    mCtx.arc(w.cx, w.cy, w.r, Math.PI, Math.PI * 2);
                    mCtx.strokeStyle = `rgba(100,255,200,${w.alpha})`;
                    mCtx.lineWidth = 15;
                    mCtx.shadowColor = "#64ffc8";
                    mCtx.shadowBlur = 20;
                    mCtx.stroke();
                    mCtx.restore();
                    for (let j = meteors.length - 1; j >= 0; j--) {
                        const m = meteors[j];
                        if (!m || m.markedForDeath) continue;
                        const d = Math.hypot(m.x - w.cx, m.y - w.cy);
                        if (d < w.r + 30) m.markedForDeath = true;
                    }
                }

                mCtx.fillStyle = missedMeteors >= 15 ? "#ff3366" : "#aaaaaa";
                mCtx.font = "bold 24px sans-serif";
                mCtx.textAlign = "center";
                mCtx.fillText(`Пропущено: ${missedMeteors} / 20`, W() / 2, 40);

                if (W() > 768) {
                    let etc = empCharges > 0 ? "#ffffff" : "#666666",
                        etx = cx,
                        ety = H() - 25;
                    if (Date.now() - empWarningTime < 400) {
                        etc = "#ff3333";
                        etx += (Math.random() - 0.5) * 10;
                        ety += (Math.random() - 0.5) * 10;
                    }
                    mCtx.fillStyle = etc;
                    mCtx.font = "bold 16px sans-serif";
                    mCtx.textAlign = "center";
                    mCtx.fillText(
                        `💥 Супер-волны (Пробел): ${empCharges} / 5`,
                        etx,
                        ety,
                    );
                }

                const maxM =
                    W() < 600 ? (ultraMode ? 8 : 3) : ultraMode ? 20 : 5;
                if (meteors.length < maxM)
                    spawnMeteorBatch(Math.min(2, maxM - meteors.length));

                if (keysDown["ArrowLeft"] || keysDown["a"] || keysDown["A"])
                    saucer.x -= 6;
                else if (
                    keysDown["ArrowRight"] ||
                    keysDown["d"] ||
                    keysDown["D"]
                )
                    saucer.x += 6;
                else saucer.x += (mouseX - saucer.x) * 0.08;
                saucer.x = Math.max(
                    saucer.r * 1.2,
                    Math.min(W() - saucer.r * 1.2, saucer.x),
                );
                const dx = saucer.x - cx,
                    dy = Math.sqrt(pR * pR - dx * dx);
                saucer.y = cy - dy - saucer.r - 15;
                saucer.angle = Math.atan2(saucer.y - cy, saucer.x - cx);

                if (ultraMode) {
                    const rem = ultraEndTime - Date.now();
                    if (rem <= 0) {
                        ultraMode = false;
                        document
                            .getElementById("ultra-hud")
                            .classList.remove("active");
                    } else
                        document.getElementById("ultra-bar").style.width =
                            (rem / ULTRA_DURATION) * 100 + "%";
                    drawUltraBeam(mCtx);
                } else {
                    if (isMouseDown) {
                        const now = Date.now();
                        if (
                            !window.lastLaserTime ||
                            now - window.lastLaserTime > 120
                        ) {
                            window.lastLaserTime = now;
                            fireLaser();
                        }
                    }
                }

                for (let i = lasers.length - 1; i >= 0; i--) {
                    const l = lasers[i],
                        px = l.x,
                        py = l.y;
                    l.x += l.vx;
                    l.y += l.vy;
                    l.life -= 0.005;
                    if (
                        l.life <= 0 ||
                        l.x < -50 ||
                        l.x > W() + 50 ||
                        l.y < -50 ||
                        l.y > H() + 50
                    ) {
                        lasers.splice(i, 1);
                        continue;
                    }
                    mCtx.save();
                    mCtx.globalAlpha = l.life > 1 ? 1 : l.life;
                    mCtx.strokeStyle = l.color;
                    mCtx.lineWidth = l.width * 4;
                    mCtx.shadowColor = l.color;
                    mCtx.shadowBlur = 20;
                    mCtx.lineCap = "round";
                    mCtx.beginPath();
                    mCtx.moveTo(px, py);
                    mCtx.lineTo(l.x, l.y);
                    mCtx.stroke();
                    mCtx.strokeStyle = "#fff";
                    mCtx.lineWidth = l.width * 0.4;
                    mCtx.shadowBlur = 5;
                    mCtx.beginPath();
                    mCtx.moveTo(px, py);
                    mCtx.lineTo(l.x, l.y);
                    mCtx.stroke();
                    mCtx.restore();
                    for (let j = meteors.length - 1; j >= 0; j--) {
                        const m = meteors[j];
                        if (!m || m.markedForDeath) continue;
                        if (
                            Math.hypot(l.x - m.x, l.y - m.y) < m.r &&
                            l.life > 0
                        ) {
                            m.hp -= 1;
                            m.hitTime = Date.now();
                            for (let k = 0; k < 6; k++) {
                                if (mParticles.length > 300) break;
                                const a = Math.random() * Math.PI * 2,
                                    spd = 2 + Math.random() * 5;
                                mParticles.push({
                                    x: l.x,
                                    y: l.y,
                                    vx: Math.cos(a) * spd,
                                    vy: Math.sin(a) * spd,
                                    r: 2 + Math.random() * 3,
                                    color: l.color,
                                    alpha: 1,
                                    life: 1,
                                    decay: 0.025,
                                });
                            }
                            if (m.hp <= 0) m.markedForDeath = true;
                            break;
                        }
                    }
                }

                for (let i = meteors.length - 1; i >= 0; i--) {
                    const m = meteors[i];
                    if (!m) continue;
                    if (m.markedForDeath) {
                        destroyMeteor(m, i);
                        continue;
                    }
                    m.x += m.vx;
                    m.y += m.vy;
                    m.rot += m.rotSpeed;
                    if (Math.random() > 0.6 && mParticles.length < 300) {
                        mParticles.push({
                            x: m.x - m.vx * 2 + (Math.random() - 0.5) * m.r,
                            y: m.y - m.vy * 2 + (Math.random() - 0.5) * m.r,
                            vx: (Math.random() - 0.5) * 1,
                            vy: Math.random() * 1,
                            r: Math.random() * 3 + 1,
                            color: `hsl(${m.hue},100%,60%)`,
                            alpha: 1,
                            life: 1,
                            decay: Math.random() * 0.05 + 0.03,
                        });
                    }
                    const distP = Math.hypot(m.x - cx, m.y - cy);
                    if (
                        distP < pR + m.r - 5 ||
                        Math.hypot(m.x - saucer.x, m.y - saucer.y) <
                            m.r + saucer.r * 0.7
                    ) {
                        missedMeteors++;
                        doScreenShake(MC, 15, 300);
                        for (let k = 0; k < 25; k++) {
                            if (mParticles.length > 300) break;
                            const a = Math.random() * Math.PI * 2,
                                spd = 3 + Math.random() * 8;
                            mParticles.push({
                                x: m.x,
                                y: m.y,
                                vx: Math.cos(a) * spd,
                                vy: Math.sin(a) * spd,
                                r: 2 + Math.random() * 4,
                                color: m.color,
                                alpha: 1,
                                life: 1,
                                decay: 0.02,
                            });
                        }
                        playExplosion();
                        meteors.splice(i, 1);
                        if (missedMeteors >= 20) isGameOver = true;
                        continue;
                    }
                    drawMeteor(mCtx, m);
                }

                for (let i = mDebris.length - 1; i >= 0; i--) {
                    const d = mDebris[i];
                    d.x += d.vx;
                    d.y += d.vy;
                    d.vy += 0.12;
                    d.rot += d.rotSpeed;
                    d.life -= 0.01;
                    d.alpha = d.life;
                    if (d.life <= 0) {
                        mDebris.splice(i, 1);
                        continue;
                    }
                    mCtx.save();
                    mCtx.globalAlpha = d.alpha;
                    mCtx.translate(d.x, d.y);
                    mCtx.rotate(d.rot);
                    mCtx.beginPath();
                    for (let k = 0; k < d.verts.length; k++) {
                        const a = (k / d.verts.length) * Math.PI * 2,
                            r = d.r * d.verts[k];
                        k === 0
                            ? mCtx.moveTo(Math.cos(a) * r, Math.sin(a) * r)
                            : mCtx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                    }
                    mCtx.closePath();
                    mCtx.fillStyle = d.color;
                    mCtx.shadowColor = `rgba(255,100,0,${d.alpha})`;
                    mCtx.shadowBlur = 8;
                    mCtx.fill();
                    mCtx.restore();
                }

                for (let i = mParticles.length - 1; i >= 0; i--) {
                    const p = mParticles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay || 0.025;
                    p.alpha = p.life;
                    if (p.life <= 0) {
                        mParticles.splice(i, 1);
                        continue;
                    }
                    mCtx.save();
                    mCtx.globalAlpha = p.alpha;
                    mCtx.beginPath();
                    mCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    mCtx.fillStyle = p.color;
                    mCtx.shadowColor = p.color;
                    mCtx.shadowBlur = 6;
                    mCtx.fill();
                    mCtx.restore();
                }

                drawSaucer(mCtx, saucer.x, saucer.y, saucer.r, saucer.angle);
                meteorAnimId = requestAnimationFrame(meteorLoop);
            }

            function destroyMeteor(m, idx) {
                if (idx === undefined) {
                    if (!m) return;
                    idx = meteors.indexOf(m);
                    if (idx === -1) return;
                }
                meteorDestroyed++;
                document.getElementById("destroyed-count").textContent =
                    "☄️ " + meteorDestroyed;
                if (meteorDestroyed >= 1000) {
                    isGameOver = true;
                    isGameWon = true;
                }
                const dc = 10 + Math.floor(m.r * 0.4);
                for (let i = 0; i < dc; i++) {
                    if (mDebris.length > 150) break;
                    const a =
                            (i / dc) * Math.PI * 2 +
                            (Math.random() - 0.5) * 0.8,
                        spd = 3 + Math.random() * 6;
                    mDebris.push({
                        x: m.x,
                        y: m.y,
                        vx: Math.cos(a) * spd,
                        vy: Math.sin(a) * spd - 2,
                        r: 3 + Math.random() * m.r * 0.35,
                        rot: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.2,
                        color: m.color,
                        life: 1,
                        alpha: 1,
                        verts: Array.from(
                            { length: 5 },
                            () => 0.6 + Math.random() * 0.7,
                        ),
                    });
                }
                for (let i = 0; i < 25; i++) {
                    if (mParticles.length > 300) break;
                    const a = Math.random() * Math.PI * 2,
                        spd = 4 + Math.random() * 7;
                    mParticles.push({
                        x: m.x,
                        y: m.y,
                        vx: Math.cos(a) * spd,
                        vy: Math.sin(a) * spd,
                        r: 2 + Math.random() * 4,
                        color: m.color,
                        alpha: 1,
                        life: 1,
                        decay: 0.02,
                    });
                }
                playExplosion();
                meteors.splice(idx, 1);
                if (m.isExplosive) {
                    for (let i = 0; i < 20; i++) {
                        if (mParticles.length > 300) break;
                        const a = Math.random() * Math.PI * 2,
                            spd = 4 + Math.random() * 10;
                        mParticles.push({
                            x: m.x,
                            y: m.y,
                            vx: Math.cos(a) * spd,
                            vy: Math.sin(a) * spd,
                            r: 5 + Math.random() * 12,
                            color: "rgba(255,60,0,0.9)",
                            alpha: 1,
                            life: 1,
                            decay: 0.03,
                        });
                    }
                    doScreenShake(MC, 12, 400);
                    meteors.forEach((om) => {
                        if (Math.hypot(m.x - om.x, m.y - om.y) < 200)
                            om.markedForDeath = true;
                    });
                }
                if (meteorDestroyed % 10 === 0 && !ultraMode)
                    activateUltraMode();
                const mils = {
                    5: "⚡ ДАВАЙ!",
                    10: "🔥 ОГОНЬ!",
                    25: "⚡ СУПЕР!",
                    50: "🌟 МАШИНА!",
                    100: "👑 БОГ!",
                };
                if (mils[meteorDestroyed])
                    showMilestone(
                        mils[meteorDestroyed],
                        "Уничтожено: " + meteorDestroyed,
                        "#ff8c42",
                    );
            }

            function drawMeteor(ctx, m) {
                ctx.save();
                ctx.translate(m.x, m.y);
                ctx.rotate(m.rot);
                const dmg = 1 - m.hp / m.maxHp;
                ctx.beginPath();
                for (let i = 0; i < m.verts.length; i++) {
                    const a = (i / m.verts.length) * Math.PI * 2,
                        r = m.r * m.verts[i];
                    i === 0
                        ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r)
                        : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                }
                ctx.closePath();
                if (m.isExplosive) {
                    ctx.shadowColor = `rgba(255,60,0,${0.5 + 0.5 * Math.sin(Date.now() * 0.008)})`;
                    ctx.shadowBlur = 20;
                } else if (m.isGlowing) {
                    ctx.shadowColor = `hsl(${m.hue},80%,60%)`;
                    ctx.shadowBlur = 15;
                }
                const grad = ctx.createLinearGradient(-m.r, -m.r, m.r, m.r),
                    bL = m.lit + dmg * 15;
                grad.addColorStop(0, `hsl(${m.hue},${m.sat}%,${bL}%)`);
                grad.addColorStop(
                    1,
                    `hsl(${m.hue},${Math.max(0, m.sat - 20)}%,${Math.max(0, bL - 25)}%)`,
                );
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = m.isExplosive
                    ? "#ff3333"
                    : `hsl(${m.hue},90%,60%)`;
                ctx.lineWidth = 2 + dmg * 2;
                ctx.stroke();
                const th = Date.now() - m.hitTime;
                if (th < 120) {
                    ctx.fillStyle = `rgba(255,255,255,${1 - (th / 120) * 0.6})`;
                    ctx.fill();
                }
                if (m.hp < m.maxHp) {
                    ctx.save();
                    ctx.translate(0, -m.r - 12);
                    ctx.rotate(-m.rot);
                    const bw = m.r * 1.8,
                        bh = 5;
                    ctx.fillStyle = "rgba(0,0,0,0.6)";
                    ctx.fillRect(-bw / 2, -bh / 2, bw, bh);
                    const hpFrac = m.hp / m.maxHp;
                    ctx.fillStyle =
                        hpFrac > 0.6
                            ? "#44ff88"
                            : hpFrac > 0.3
                              ? "#ffaa00"
                              : "#ff3333";
                    ctx.fillRect(-bw / 2, -bh / 2, bw * hpFrac, bh);
                    ctx.strokeStyle = "rgba(255,255,255,0.25)";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(-bw / 2, -bh / 2, bw, bh);
                    ctx.restore();
                }
                ctx.restore();
            }

            function drawSaucer(ctx, x, y, r, angle) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle + Math.PI / 2);
                const glow = ctx.createRadialGradient(
                    0,
                    r * 0.3,
                    0,
                    0,
                    r * 0.3,
                    r * 1.5,
                );
                glow.addColorStop(0, "rgba(80,200,255,0.35)");
                glow.addColorStop(1, "rgba(80,200,255,0)");
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.ellipse(0, r * 0.3, r * 1.5, r * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(0, 0, r, r * 0.35, 0, 0, Math.PI * 2);
                const dG = ctx.createLinearGradient(0, -r * 0.35, 0, r * 0.35);
                dG.addColorStop(0, "#b0c4de");
                dG.addColorStop(0.5, "#7090b0");
                dG.addColorStop(1, "#405070");
                ctx.fillStyle = dG;
                ctx.fill();
                ctx.strokeStyle = "rgba(150,220,255,0.5)";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(0, -r * 0.1, r * 0.55, r * 0.35, 0, 0, Math.PI * 2);
                const doG = ctx.createRadialGradient(
                    -r * 0.1,
                    -r * 0.2,
                    0,
                    0,
                    0,
                    r * 0.55,
                );
                doG.addColorStop(0, "rgba(100,220,255,0.65)");
                doG.addColorStop(0.5, "rgba(60,150,220,0.45)");
                doG.addColorStop(1, "rgba(20,80,150,0.3)");
                ctx.fillStyle = doG;
                ctx.fill();
                ctx.strokeStyle = "rgba(150,230,255,0.5)";
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(
                    -r * 0.1,
                    -r * 0.25,
                    r * 0.2,
                    r * 0.1,
                    0,
                    0,
                    Math.PI * 2,
                );
                ctx.fillStyle = "rgba(255,255,255,0.38)";
                ctx.fill();
                [0, Math.PI / 2, Math.PI, (Math.PI * 3) / 2].forEach((a, i) => {
                    ctx.beginPath();
                    ctx.arc(
                        Math.cos(a) * r * 0.7,
                        Math.sin(a) * r * 0.2,
                        3.5,
                        0,
                        Math.PI * 2,
                    );
                    const lh = (i / 4) * 360 + Date.now() * 0.1;
                    ctx.fillStyle = `hsl(${lh},100%,70%)`;
                    ctx.shadowColor = `hsl(${lh},100%,70%)`;
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
                if (ultraMode) {
                    ctx.beginPath();
                    ctx.arc(0, 0, r * 1.3, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255,220,0,${0.4 + Math.sin(Date.now() * 0.02) * 0.3})`;
                    ctx.lineWidth = 4;
                    ctx.shadowColor = "#ff0";
                    ctx.shadowBlur = 20;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
                ctx.restore();
            }

            // === AUDIO FX ===
            function playBubblePop(r) {
                try {
                    const ctx = ensureAudioCtx(),
                        o = ctx.createOscillator(),
                        g = ctx.createGain();
                    o.connect(g);
                    g.connect(ctx.destination);
                    o.type = "sine";
                    const f = 600 - r * 2.5;
                    o.frequency.setValueAtTime(f, ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(
                        f * 2.5,
                        ctx.currentTime + 0.08,
                    );
                    g.gain.setValueAtTime(0.15, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(
                        0.001,
                        ctx.currentTime + 0.15,
                    );
                    o.start();
                    o.stop(ctx.currentTime + 0.15);
                } catch (e) {}
            }

            function playNote(fr) {
                try {
                    const ctx = ensureAudioCtx(),
                        o = ctx.createOscillator(),
                        g = ctx.createGain();
                    o.connect(g);
                    g.connect(ctx.destination);
                    o.type = "triangle";
                    o.frequency.setValueAtTime(fr, ctx.currentTime);
                    g.gain.setValueAtTime(0.1, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(
                        0.001,
                        ctx.currentTime + 0.2,
                    );
                    o.start();
                    o.stop(ctx.currentTime + 0.2);
                } catch (e) {}
            }

            function playLaserSound() {
                try {
                    const ctx = ensureAudioCtx(),
                        o = ctx.createOscillator(),
                        g = ctx.createGain();
                    o.connect(g);
                    g.connect(ctx.destination);
                    o.type = "sawtooth";
                    o.frequency.setValueAtTime(800, ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(
                        200,
                        ctx.currentTime + 0.12,
                    );
                    g.gain.setValueAtTime(0.045, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(
                        0.001,
                        ctx.currentTime + 0.12,
                    );
                    o.start();
                    o.stop(ctx.currentTime + 0.12);
                } catch (e) {}
            }

            function playExplosion() {
                try {
                    const ctx = ensureAudioCtx(),
                        b = ctx.createBuffer(
                            1,
                            ctx.sampleRate * 0.2,
                            ctx.sampleRate,
                        ),
                        d = b.getChannelData(0);
                    for (let i = 0; i < b.length; i++)
                        d[i] = Math.random() * 2 - 1;
                    const ns = ctx.createBufferSource();
                    ns.buffer = b;
                    const lp = ctx.createBiquadFilter();
                    lp.type = "lowpass";
                    lp.frequency.setValueAtTime(1000, ctx.currentTime);
                    lp.frequency.exponentialRampToValueAtTime(
                        100,
                        ctx.currentTime + 0.2,
                    );
                    const g = ctx.createGain();
                    g.gain.setValueAtTime(0.2, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(
                        0.01,
                        ctx.currentTime + 0.2,
                    );
                    ns.connect(lp);
                    lp.connect(g);
                    g.connect(ctx.destination);
                    ns.start();
                    ns.stop(ctx.currentTime + 0.2);
                } catch (e) {}
            }

            function playUltraSound() {
                try {
                    const ctx = ensureAudioCtx(),
                        o = ctx.createOscillator(),
                        g = ctx.createGain();
                    o.connect(g);
                    g.connect(ctx.destination);
                    o.type = "square";
                    o.frequency.setValueAtTime(50, ctx.currentTime);
                    o.frequency.linearRampToValueAtTime(
                        300,
                        ctx.currentTime + 0.5,
                    );
                    g.gain.setValueAtTime(0, ctx.currentTime);
                    g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.1);
                    g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
                    o.start();
                    o.stop(ctx.currentTime + 0.8);
                } catch (e) {}
            }
        </script>
